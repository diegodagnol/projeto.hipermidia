    <!-- ESTRELA 6 PONTAS
         Forma do original:
         - ponta topo (fina, alongada, levemente triangular)
         - ponta base (fina, alongada — conecta ao pilar)
         - 2 pontas laterais esq/dir (médias, levemente arredondadas)
         - 2 pontas diagonais sup esq/dir (finas)
         Concavidades bem marcadas entre as pontas.
         Centro em (74, 50), raio externo ~44, raio interno ~18
    -->

    <!-- Os 6 vértices externos da estrela, distribuídos a cada 60°
         com ponta 0 apontando para cima (−90°):
         P0 top:     74, 6
         P1 dir-sup: 74+44*cos(30°)=74+38=112,  50−44*sin(30°)=50−22=28
         P2 dir-inf: 74+44*cos(−30°)=112,        50+22=72
         P3 bot:     74, 94
         P4 esq-inf: 74−38=36,  72
         P5 esq-sup: 36,        28

         Vértices internos (raio 16, offset 30°):
         I0: 74+16*cos(0°)=90,  50
         I1: 74+16*cos(−60°)=82, 50+14=64   → entre P1 e P2
         I2: 74+16*cos(−120°)=66, 64         → entre P2 e P3
         I3: 74−16=58, 50                     → entre P3 e P4
         I4: 66, 36                           → entre P4 e P5
         I5: 82, 36                           → entre P5 e P0

         Ajuste: raio interno = 14 para concavidade mais marcada
    -->

    <!-- sombra extrusion -->
    <g transform="translate(5,6)" opacity=".5">
      <polygon points="

        112,72  82,64  74,94
        66,64   36,72  58,50
        36,28   66,36

        66,64   36,72  58,50

        36,28   66,36

    <circle cx="70" cy="23" r="2.5" fill="#fff" opacity=".55"/>
